<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- paper background -->
  <rect width="1200" height="630" fill="#ECE8DE"/>

  <!-- 12-col grid overlay -->
  <g opacity="0.18" stroke="#BEB8A8" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- top rule -->
  <line x1="60" y1="80" x2="1140" y2="80" stroke="#0B0B0B" stroke-width="1"/>
  <text x="60" y="65" font-family="'SF Mono', monospace" font-size="13" fill="#6E6A5E" letter-spacing="1.5">CODEWIKI / V1.0 · OPEN SOURCE</text>
  <text x="1140" y="65" text-anchor="end" font-family="'SF Mono', monospace" font-size="13" fill="#6E6A5E" letter-spacing="1.5">§ A CLAUDE CODE SKILL</text>

  <!-- Section header bar -->
  <text x="60" y="180" font-family="'SF Mono', monospace" font-size="14" fill="#0B0B0B" letter-spacing="2">§ 01 — THE THESIS</text>

  <!-- Title: huge typography with serif italic -->
  <text x="60" y="310" font-family="'Geist', -apple-system, sans-serif" font-size="128" font-weight="800" fill="#0B0B0B" letter-spacing="-5">docs that</text>
  <text x="60" y="450" font-family="'Geist', -apple-system, sans-serif" font-size="128" font-weight="800" fill="#0B0B0B" letter-spacing="-5">
    <tspan font-family="'Instrument Serif', serif" font-style="italic" font-weight="400">talk</tspan>
    <tspan> back.</tspan>
  </text>

  <!-- Highlighter wash behind "talk" -->
  <rect x="58" y="368" width="180" height="86" fill="#EEFF57" opacity="0.85"/>
  <text x="60" y="450" font-family="'Instrument Serif', serif" font-style="italic" font-weight="400" font-size="128" fill="#0B0B0B">talk</text>

  <!-- Install command box -->
  <rect x="60" y="510" width="700" height="56" fill="#E4DFD3" stroke="#0B0B0B" stroke-width="1"/>
  <text x="80" y="546" font-family="'SF Mono', monospace" font-size="18" fill="#5E4AE3">$</text>
  <text x="110" y="546" font-family="'SF Mono', monospace" font-size="18" fill="#0B0B0B">npx skills add susumutomita/codewiki</text>

  <!-- Right side tagline -->
  <text x="780" y="530" font-family="'SF Mono', monospace" font-size="13" fill="#6E6A5E" letter-spacing="1">DEMOCRATIZE</text>
  <text x="780" y="552" font-family="'SF Mono', monospace" font-size="13" fill="#6E6A5E" letter-spacing="1">AI-ASSISTED</text>
  <text x="780" y="574" font-family="'SF Mono', monospace" font-size="13" fill="#0B0B0B" font-weight="600" letter-spacing="1">CODE READING.</text>

  <!-- bottom rule -->
  <line x1="60" y1="600" x2="1140" y2="600" stroke="#0B0B0B" stroke-width="1"/>
  <text x="60" y="620" font-family="'SF Mono', monospace" font-size="11" fill="#6E6A5E" letter-spacing="1.5">GITHUB.COM/SUSUMUTOMITA/CODEWIKI</text>
  <text x="1140" y="620" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" fill="#6E6A5E" letter-spacing="1.5">MIT · LOCAL · ZERO STALE DOCS</text>
</svg>
