<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.2)"/>
      <stop offset="70%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo circle -->
  <circle cx="600" cy="180" r="50" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="600" y="198" text-anchor="middle" font-size="40" fill="white">&#x1F916;</text>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">codewiki</text>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" fill="#8888a0">DeepWiki, but you can talk to it.</text>

  <!-- Features -->
  <rect x="200" y="400" width="200" height="44" rx="8" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="300" y="428" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" fill="#a78bfa">Live AI Chat</text>

  <rect x="420" y="400" width="200" height="44" rx="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
  <text x="520" y="428" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" fill="#22c55e">Right-Click → Ask</text>

  <rect x="640" y="400" width="200" height="44" rx="8" fill="rgba(59,130,246,0.12)" stroke="#3b82f6" stroke-width="1"/>
  <text x="740" y="428" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" fill="#3b82f6">Full Rebuild</text>

  <rect x="860" y="400" width="200" height="44" rx="8" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
  <text x="960" y="428" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" fill="#f59e0b">100% Local</text>

  <!-- Install command -->
  <rect x="300" y="490" width="600" height="52" rx="12" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="340" y="522" font-family="SF Mono, 'Fira Code', monospace" font-size="16" fill="#8b5cf6">$</text>
  <text x="365" y="522" font-family="SF Mono, 'Fira Code', monospace" font-size="16" fill="white">npx skills add susumutomita/codewiki</text>

  <!-- Bottom -->
  <text x="600" y="595" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#555">Claude Code Skill — Any codebase → interactive AI-powered wiki</text>
</svg>
